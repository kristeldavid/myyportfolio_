<! DOCTYPE html>
<html>
    <head>
        <title>Lab exercise #3 HTML Forms </title>
    </head >
    <body>
        <form>
            <fieldset>
                <legend><b>Request for proposal </b></legend>
                    <table>
                        <tr>
                            <td>Your Company:</td>
                            <td><input type= "text"></td>
                            </tr>
                            <tr>
                                <td>Email:</td>
                                <td><input type= "email"></td>
                            </tr>
                            <tr>
                                <td> Username:</td>
                                <td><input type="text" value="telly"></td>
                            </tr>
                            <tr>
                                <td>Password:</td>
                                <td><input type = "password" value="123456" ></td>
                            </tr>
                            <tr>
                                <td>Your business:</td>
                                <td>
                                    <textarea rows="5"  cols="30">
                                        Briefly describe your business in this place:
                                    </textarea>
                                </td>
                            </tr>
                            <tr>
                                <td> Company size :</td>
                                <td>
                                    <input type = "radio"  name="size">Less than 10 <br>
                                     <input type = "radio"  name="size">11 to 50 <br>
                                      <input type = "radio"  name="size">50 to 200 <br>
                                       <input type = "radio"  name="size">over 200 <br>
                                </td>
                            </tr>

                                <td. Services :</td>

                                    <input type="checkbox"> Brand Identity

                                      <input type="checkbox"> Web Redesign
                                      <br>
                                </td>
                            </tr>
                            <tr>
                            <td> Timeline:</td>
                            <td>
                                <select >
                                    <option> imediately</option>
                                    <option> 1-2 weeks</option>
                                    <option> 3-6 weeks</option>
                                    <option> 7-2 months</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td></td>
                            <td><input type="Submit" value="Send to dev/design"></td>
                        </tr>
                    </table>
                </fielset>
            </form>
        </body>
        </html>
